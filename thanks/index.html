<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — Drama Geeks</title>
<meta name="description" content="Thanks for getting in touch with Drama Geeks. We'll get back to you within 48 hours.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="nav-placeholder"></div>

<main>
  <section style="padding:var(--sp-8) var(--gutter);text-align:center;min-height:60vh;display:flex;align-items:center">
    <div style="max-width:560px;margin:0 auto">
      <div style="font-size:48px;margin-bottom:var(--sp-4)">🎭</div>
      <p class="section-eyebrow">Message Received</p>
      <h1 class="section-title">Thanks — we'll be<br><em>in touch soon.</em></h1>
      <p style="font-size:18px;color:var(--mid);line-height:1.7;margin:var(--sp-4) 0 var(--sp-5)">We reply to every message personally, usually within 48 hours. Keep an eye on your inbox — and check your spam folder just in case.</p>
      <div style="display:flex;flex-direction:column;gap:var(--sp-3);align-items:center">
        <a href="/" class="btn btn--primary">Back to Home</a>
        <a href="/classes/" style="font-size:14px;color:var(--mid)">Browse our classes while you wait →</a>
      </div>
      <div style="margin-top:var(--sp-7);padding-top:var(--sp-5);border-top:1px solid var(--line)">
        <p style="font-size:13px;color:var(--mid);margin-bottom:var(--sp-2)">Follow Drama Geeks</p>
        <!-- TODO: owner content — add social media links -->
        <div style="display:flex;gap:var(--sp-4);justify-content:center">
          <a href="#" style="font-size:14px;color:var(--blue)">Facebook</a>
          <a href="#" style="font-size:14px;color:var(--blue)">Instagram</a>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>
<script src="/components/nav-loader.js"></script>
<script src="/components/footer-loader.js"></script>
</body>
</html>
